server:
  port: 8080

spring:
  application:
    name: review-system

  neo4j:
    uri: bolt://localhost:7687
    authentication:
      username: neo4j
      password: 12345678

  datasource:
    url: jdbc:mysql://localhost:3306/review_system?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  mail:
    host: smtp.qq.com
    port: 465
    username: your-email@qq.com
    password: your-email-auth-code
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
            required: true
        transport:
          protocol: smtp
    default-encoding: UTF-8

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

jwt:
  secret: review-system-secret-key-for-jwt-token-generation-please-change-in-production
  expiration: 86400000

app:
  python-service:
    url: http://localhost:5000
  file:
    upload-path: ./uploads/papers
    pdf-base-url: http://localhost:8080/files/papers
  blind-review:
    enabled-default: true
    auto-desensitize: true
    desensitize-fields:
      - authors
      - affiliation
      - acknowledgements
    reviewer-alias-pattern: "评审专家%s"

logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.data.neo4j: DEBUG
    org.hibernate.SQL: DEBUG
