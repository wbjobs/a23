version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: review_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: review_system
      MYSQL_USER: review
      MYSQL_PASSWORD: review123
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - review-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.15-community
    container_name: review_neo4j
    restart: always
    environment:
      NEO4J_AUTH: neo4j/12345678
      NEO4J_server_bolt_listen__address: 0.0.0.0:7687
      NEO4J_server_http_listen__address: 0.0.0.0:7474
      NEO4J_server_memory_heap_initial__size: 512M
      NEO4J_server_memory_heap_max__size: 2G
      NEO4J_server_memory_pagecache_size: 1G
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - review-net
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  grobid:
    image: lfoppiano/grobid:0.8.0
    container_name: review_grobid
    restart: always
    ports:
      - "8070:8070"
    environment:
      GROBID_CONSOLIDATION: "0"
      JAVA_OPTS: "-Xmx1g -Xms512m"
    networks:
      - review-net
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8070/api/processHeaderDocument || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5

  python-service:
    build:
      context: ./python-service
      dockerfile: Dockerfile
    container_name: review_python
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      grobid:
        condition: service_healthy
    volumes:
      - python_temp:/app/temp
    environment:
      GROBID_URL: http://grobid:8070
      FLASK_ENV: production
    networks:
      - review-net
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:5000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: review_backend
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      python-service:
        condition: service_healthy
    environment:
      SPRING_NEO4J_URI: bolt://neo4j:7687
      SPRING_NEO4J_AUTHENTICATION_USERNAME: neo4j
      SPRING_NEO4J_AUTHENTICATION_PASSWORD: 12345678
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/review_system?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      APP_PYTHON_SERVICE_URL: http://python-service:5000
    volumes:
      - uploads:/app/uploads
    networks:
      - review-net
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/api/auth/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: review_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - review-net

volumes:
  mysql_data:
  neo4j_data:
  neo4j_logs:
  python_temp:
  uploads:

networks:
  review-net:
    driver: bridge
